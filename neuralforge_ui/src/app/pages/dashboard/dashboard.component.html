<!-- Welcome Banner -->
<mat-card class="welcome-banner" *ngIf="welcomeMessages.length">
  <mat-icon class="welcome-icon">
    {{ welcomeMessages[currentMessageIndex].icon }}
  </mat-icon>
  <span class="welcome-text">
    {{ welcomeMessages[currentMessageIndex].text }}
  </span>
</mat-card>

<div class="section" *ngFor="let section of sections">
  <div class="section-header">
    <h2>{{ section.title }}</h2>
    <button
      mat-raised-button
      color="primary"
      (click)="section.buttonAction && section.buttonAction()"
    >
      {{ section.buttonText }}
    </button>
  </div>

  <div class="loading-indicator" *ngIf="section.isLoading">
    <mat-icon class="spin">refresh</mat-icon>
    <span>Loading {{ section.title }}...</span>
  </div>

  <div *ngIf="!section.isLoading">
    <!-- Show error state when an error occurred -->
    <div *ngIf="section.hasError" class="error-state">
      <mat-card class="error-card">
        <mat-icon class="error-icon">error_outline</mat-icon>
        <h3 class="error-title">Oops! Something went wrong</h3>
        <p class="error-message">{{ section.errorMessage }}</p>
        <button
          mat-raised-button
          color="primary"
          (click)="fetchLearningProjects()"
        >
          Try Again
        </button>
      </mat-card>
    </div>

    <!-- Show empty state when no cards are available and no error -->
    <app-empty-state
      *ngIf="section.cards.length === 0 && !section.hasError"
      icon="folder_open"
      [title]="'No ' + section.title + ' yet'"
      [message]="
        'Click the \'' + section.buttonText + '\' button to get started!'
      "
      [buttonText]="section.buttonText"
      (onButtonClick)="section.buttonAction && section.buttonAction()"
    ></app-empty-state>

    <!-- Show cards when available -->
    <div class="card-container" *ngIf="section.cards.length > 0">
      <mat-card class="custom-card" *ngFor="let card of section.cards">
        <mat-card-title>{{ card.title }}</mat-card-title>
        <mat-card-content>
          <p>{{ card.content }}</p>
          <p *ngIf="card.count !== undefined">
            <strong>{{ card.count }} students</strong>
          </p>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button color="primary">Enter</button>
        </mat-card-actions>
      </mat-card>
    </div>
  </div>
</div>
