<div class="profile-container">
  <app-spinner
          *ngIf="isLoading"
          [message]="'Loading profile information...'"
  ></app-spinner>

  <div *ngIf="!isLoading">
    <!-- Header with user info -->
    <div class="profile-header">
      <div class="user-info">
        <h2>{{ userProfile.firstName }} {{ userProfile.lastName }}</h2>
        <p>{{ userProfile.email }}</p>
      </div>
      <div class="action-buttons">
        <button
                *ngIf="!isEditing"
                mat-raised-button
                color="primary"
                class="edit-button"
                (click)="toggleEdit()"
        >
          Edit
        </button>
        <ng-container *ngIf="isEditing">
          <button
                  mat-raised-button
                  class="cancel-button"
                  (click)="cancelEdit()"
          >
            Cancel
          </button>
          <button mat-raised-button class="save-button" (click)="onSubmit()">
            Save
          </button>
        </ng-container>
      </div>
    </div>

    <!-- User form -->
    <form [formGroup]="userProfileForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-field">
          <label>First Name</label>
          <mat-form-field appearance="outline" class="full-width">
            <input matInput formControlName="firstName" placeholder="First Name" />
          </mat-form-field>
        </div>
        <div class="form-field">
          <label>Last Name</label>
          <mat-form-field appearance="outline" class="full-width">
            <input
                    matInput
                    formControlName="lastName"
                    placeholder="Last Name"
            />
          </mat-form-field>
        </div>
      </div>
    </form>

    <!-- Credentials section -->
    <div class="credentials-section">
      <h3>Credentials</h3>
      <div class="credentials-content">
        <div class="email-display">
          <mat-icon>email</mat-icon>
          <span>{{ userProfile.email }}</span>
        </div>
        <div class="credential-buttons">
          <button
                  mat-flat-button
                  class="credential-button"
                  (click)="changePassword()"
          >
            CHANGE PASSWORD
          </button>
          <button
                  mat-raised-button
                  class="cancel-button"
                  (click)="deleteAccount()"
          >
            DELETE ACCOUNT
          </button>
        </div>
      </div>
    </div>

    <!-- Dates section -->
    <div class="dates-section">
      <div class="form-row">
        <div class="form-field">
          <label>Registration Date</label>
          <mat-form-field appearance="outline" class="full-width">
            <input
                    matInput
                    [formControl]="registrationDateControl"
                    [readonly]="true"
            />
          </mat-form-field>
        </div>
        <div class="form-field">
          <label>Last Password Change</label>
          <mat-form-field appearance="outline" class="full-width">
            <input
                    matInput
                    [formControl]="lastPasswordChangeControl"
                    [readonly]="true"
            />
          </mat-form-field>
        </div>
      </div>
    </div>
  </div>
</div>
