<div class="profile-container">
  <app-spinner
    *ngIf="isLoading"
    [message]="'Cargando información del perfil...'"
  ></app-spinner>

  <div *ngIf="!isLoading">
    <!-- Header with user info -->
    <div class="profile-header">
      <div class="user-info">
        <h2>{{ userProfile.firstName }} {{ userProfile.lastName }}</h2>
        <p>{{ userProfile.email }}</p>
      </div>
      <div class="action-buttons">
        <button
          *ngIf="!isEditing"
          mat-raised-button
          color="primary"
          class="edit-button"
          (click)="toggleEdit()"
        >
          Editar
        </button>
        <ng-container *ngIf="isEditing">
          <button
            mat-raised-button
            class="cancel-button"
            (click)="cancelEdit()"
          >
            Cancelar
          </button>
          <button mat-raised-button class="save-button" (click)="onSubmit()">
            Guardar
          </button>
        </ng-container>
      </div>
    </div>

    <!-- User form -->
    <form [formGroup]="userProfileForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-field">
          <label>Nombre</label>
          <mat-form-field appearance="outline" class="full-width">
            <input matInput formControlName="firstName" placeholder="Nombre" />
          </mat-form-field>
        </div>
        <div class="form-field">
          <label>Apellidos</label>
          <mat-form-field appearance="outline" class="full-width">
            <input
              matInput
              formControlName="lastName"
              placeholder="Apellidos"
            />
          </mat-form-field>
        </div>
      </div>
    </form>

    <!-- Credentials section -->
    <div class="credentials-section">
      <h3>Credenciales</h3>
      <div class="credentials-content">
        <div class="email-display">
          <mat-icon>email</mat-icon>
          <span>{{ userProfile.email }}</span>
        </div>
        <div class="credential-buttons">
          <button
            mat-flat-button
            class="credential-button"
            (click)="changePassword()"
          >
            CAMBIAR CONTRASEÑA
          </button>
          <button
            mat-raised-button
            class="cancel-button"
            (click)="deleteAccount()"
          >
            ELIMINAR CUENTA
          </button>
        </div>
      </div>
    </div>

    <!-- Dates section -->
    <div class="dates-section">
      <div class="form-row">
        <div class="form-field">
          <label>Fecha de registro</label>
          <mat-form-field appearance="outline" class="full-width">
            <input
              matInput
              [formControl]="registrationDateControl"
              [readonly]="true"
            />
          </mat-form-field>
        </div>
        <div class="form-field">
          <label>Último cambio de contraseña</label>
          <mat-form-field appearance="outline" class="full-width">
            <input
              matInput
              [formControl]="lastPasswordChangeControl"
              [readonly]="true"
            />
          </mat-form-field>
        </div>
      </div>
    </div>
  </div>
</div>
