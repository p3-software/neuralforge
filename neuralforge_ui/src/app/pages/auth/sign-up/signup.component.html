<div class="login-container">
  <div class="overlay"></div>
  <div class="login-wrapper">
    <div class="login-card">
      <!-- Logo Section -->
      <div class="text-center">
        <a class="logo text-center" routerLink="/">
          <img width="150" class="logo-img" src="../../../../assets/icons/logo@2x.png" alt="Logo" />
        </a>
      </div>

      <div class="login-main">
        <!-- Signup Form -->
        <form (ngSubmit)="handleSignup($event)" autocomplete="off" #frm="ngForm">
          <div class="mb-3 text-center">
            <h2 class="title">Create an Account</h2>
            <p class="subtitle">Fill in your details below</p>
          </div>

          <!-- Error Messages -->
          <div *ngIf="signUpError?.length" class="error-list">
            <ul>
              <li *ngFor="let error of signUpError">{{ error }}</li>
            </ul>
          </div>

          <!-- Name Fields -->
          <div class="form-group-container">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>First Name</mat-label>
              <input #name="ngModel" matInput type="text" id="name" name="name" [(ngModel)]="user.name" required />
              <mat-error *ngIf="name.invalid && name.touched">Please enter your first name</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Last Name</mat-label>
              <input #lastname="ngModel" matInput type="text" id="lastname" name="lastname" [(ngModel)]="user.lastname" />
            </mat-form-field>
          </div>

          <!-- Email -->
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Email Address</mat-label>
            <input #email="ngModel" matInput type="email" id="email" name="email" [(ngModel)]="user.email" required />
            <mat-error *ngIf="email.invalid && email.touched">Please enter a valid email</mat-error>
          </mat-form-field>

          <!-- Password -->
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Password</mat-label>
            <input
                    #password="ngModel"
                    matInput
                    [type]="showPassword ? 'text' : 'password'"
                    id="password"
                    name="password"
                    [(ngModel)]="user.password"
                    required
            />
            <button mat-icon-button matSuffix type="button" (click)="togglePasswordVisibility()">
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="password.invalid && password.touched">Please enter a valid password</mat-error>
          </mat-form-field>

          <!-- Signup Button -->
          <div class="text-center">
            <button mat-raised-button color="primary" class="signup-btn" type="submit" [disabled]="isSignUpDisabled">
              Sign Up
            </button>
          </div>

          <!-- Login Link -->
          <p class="text-center login-link">
            Already have an account?
            <a routerLink="/login">Log In</a>
          </p>

        </form>
      </div>
    </div>
  </div>
</div>
