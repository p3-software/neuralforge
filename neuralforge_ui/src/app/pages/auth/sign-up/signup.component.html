<div class="login-container">
  <div class="d-flex align-items-center justify-content-center h-100">
    <div class="login-card">
      <div class="w-100">
        <div class="text-center">
          <a class="logo text-center" routerLink="/">
            <img width="150" class="img-fluid" style="min-width: 150px; max-width: 200px;"
              src="../../../../assets/icons/logo@2x.png"
              alt="Logo"
            />
          </a>
        </div>
        <div class="login-main">
          <form (ngSubmit)="handleSignup($event)" autocomplete="off" #frm="ngForm">
            <div class="mb-3">
              <h1 class="mb-0">Sign up account</h1>
              <small style="color: #4f4f4f">
                Add your personal information.
              </small>
            </div>

            <div>
              @if (signUpError && signUpError.length > 0) {
              <ul class="text-danger">
                <li *ngFor="let error of signUpError">{{ error }}</li>
              </ul>
              }
            </div>

            <div class="d-flex mb-4">
              <div class="form-group px-1" style="flex: 1;">
                <label for="name" class="form-label mb-2">First Name</label>
                <input #name="ngModel" type="text" class="form-control" id="name" name="name"
                       placeholder="First Name" [(ngModel)]="user.name" [ngClass]="{
        'is-invalid': name.invalid && name.touched,
        'is-valid': name.valid && name.touched
      }" required />
                <div *ngIf="name.invalid" class="invalid-feedback">
                  Please add a valid name
                </div>
              </div>

              <div class="form-group px-1" style="flex: 1;">
                <label for="lastname" class="form-label mb-2">Last Name</label>
                <input #lastname="ngModel" type="text" class="form-control" id="lastname" name="lastname"
                       placeholder="Last Name" [(ngModel)]="user.lastname" />

              </div>
            </div>


            <div class="form-group px-1 mb-4">
              <label for="email" class="form-label mb-2">
                Email Address
              </label>
              <input #email="ngModel" type="text" class="form-control" id="email" name="email"
                placeholder="agent@gmail.com" [(ngModel)]="user.email" [ngClass]="{
                  'is-invalid': email.invalid && email.touched,
                  'is-valid': email.valid && email.touched
                }" required />
              <div *ngIf="email.invalid" class="invalid-feedback">
                Please add a valid email
              </div>
            </div>

            <div class="form-group px-1 mb-4">
              <label for="password" class="form-label mb-2">Password</label>
              <div class="form-input position-relative">
                <input
                        #password="ngModel"
                        [type]="showPassword ? 'text' : 'password'"
                class="form-control"
                id="password"
                name="password"
                placeholder="*****"
                [(ngModel)]="user.password"
                [ngClass]="{
                'is-invalid': password.invalid && password.touched,
                'is-valid': password.valid && password.touched
                }" required />
                <button
                        type="button"
                        class="btn btn-primary position-absolute end-0 top-50 translate-middle-y me-2"
                        (click)="togglePasswordVisibility()">
                  <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                </button>
                <div *ngIf="password.invalid" class="invalid-feedback">
                  Please add a valid password
                </div>
              </div>
            </div>

            <div class="form-group mt-2 px-1">
              <button class="btn btn-primary btn-block w-100 custom-button"
                      type="submit"
                      [disabled]="isSignUpDisabled">
                Sign up
              </button>


            </div>
            <div class="text-center mt-4">
              <a href="/login" class="text-decoration-none">Go Login</a>
              <div class="text-center mt-4">
                <a href="/reset-password-request" class="text-decoration-none">Forgot password?</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
