<div class="reset-container">
    <div class="d-flex align-items-center justify-content-center h-100">
        <div class="reset-card">
            <div class="w-100">

                <!-- Success Message -->
                <mat-card *ngIf="successMessage" class="alert-success">
                    <mat-card-content>
                        {{ successMessage }}
                    </mat-card-content>
                </mat-card>

                <!-- Reset Password Request Form -->
                <form (ngSubmit)="submitForm($event)" autocomplete="off" #frm="ngForm">
                    <div class="header-container">
                        <h4>Reset Your Password</h4>
                        <small class="text-muted">
                            Enter your email address to receive a reset password email.
                        </small>
                    </div>

                    <!-- Error List -->
                    <mat-card *ngIf="validationErrors && validationErrors.length > 0" class="error-message">
                        <mat-card-content>
                            <ul class="error-list-wrapper">
                                <li *ngFor="let error of validationErrors">{{ error }}</li>
                            </ul>
                        </mat-card-content>
                    </mat-card>

                    <!-- Email Input Field -->
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Email Address</mat-label>
                        <input matInput #resetEmail="ngModel" type="email" name="resetEmail"
                               placeholder="Insert yout email" [(ngModel)]="request.email"
                               [ngClass]="{
                                'is-invalid': resetEmail.invalid && resetEmail.touched,
                                'is-valid': resetEmail.valid && resetEmail.touched
                            }" required />
                        <mat-error *ngIf="resetEmail.invalid && resetEmail.touched">
                            Please enter a valid email address.
                        </mat-error>
                    </mat-form-field>

                    <!-- Submit Button -->
                    <div class="form-group">
                        <button mat-raised-button color="primary" type="submit" class="w-100 custom-button">
                            Send Reset Email
                        </button>
                    </div>

                    <!-- Back to Login Link -->
                    <div class="return-login">
                        <a routerLink="/login" class="text-decoration-none">Back to Login</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
