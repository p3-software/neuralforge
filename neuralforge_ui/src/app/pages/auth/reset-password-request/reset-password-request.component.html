<div class="reset-container">
    <div class="d-flex align-items-center justify-content-center h-100">
        <div class="reset-card">
            <div class="w-100">

                <!-- Mensaje de éxito -->
                <div *ngIf="successMessage" class="alert alert-success text-center">
                    {{ successMessage }}
                </div>

                <!-- Formulario de solicitud de restablecimiento de contraseña -->
                <form (ngSubmit)="submitForm($event)" autocomplete="off" #frm="ngForm">
                    <div class="mb-3 text-center">
                        <h4>Reset Your Password</h4>
                        <small class="text-muted">
                            Enter your email address to receive a reset password email.
                        </small>
                    </div>

                    <!-- Lista de errores -->
                    <div>
                        <ul *ngIf="validationErrors && validationErrors.length > 0" class="text-danger">
                            <li *ngFor="let error of validationErrors">{{ error }}</li>
                        </ul>
                    </div>

                    <!-- Campo de entrada de correo -->
                    <div class="form-group mb-4">
                        <label for="resetEmail" class="form-label mb-2">
                            Email Address
                        </label>
                        <input #resetEmail="ngModel" type="email" class="form-control" id="resetEmail" name="resetEmail"
                            placeholder="name@email.com" [(ngModel)]="request.email" [ngClass]="{
                            'is-invalid': resetEmail.invalid && resetEmail.touched,
                            'is-valid': resetEmail.valid && resetEmail.touched
                            }" required />
                        <div *ngIf="resetEmail.invalid && resetEmail.touched" class="invalid-feedback">
                            Please enter a valid email address.
                        </div>
                    </div>

                    <!-- Botón de envío -->
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary btn-block w-100 custom-button">
                            Send Reset Email
                        </button>
                    </div>

                    <!-- Enlace de regreso al login -->
                    <div class="text-center mt-3">
                        <a routerLink="/login" class="text-decoration-none">Back to Login</a>
                    </div>
                </form>
                
            </div>
        </div>
    </div>
</div>
