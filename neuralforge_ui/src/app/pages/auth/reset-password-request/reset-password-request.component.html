<div class="reset-container">
  <div class="d-flex align-items-center justify-content-center h-100">
    <div class="reset-card">
      <div class="w-100">
        <!-- Success Message View -->
        <div *ngIf="requestSent" class="success-view">
          <mat-card class="alert-success">
            <mat-card-content>
              {{ successMessage }}
            </mat-card-content>
          </mat-card>

          <!-- Back to Login Link -->
          <div class="return-login">
            <a routerLink="/login" class="text-decoration-none"
              >Back to Login</a
            >
          </div>
        </div>

        <!-- Reset Password Request Form -->
        <form
          *ngIf="!requestSent"
          [formGroup]="resetForm"
          (ngSubmit)="submitForm($event)"
          autocomplete="off"
        >
          <div class="header-container">
            <h4>Reset Your Password</h4>
            <small class="text-muted">
              Enter your email address to receive a reset password email.
            </small>
          </div>

          <!-- Error List -->
          <mat-card
            *ngIf="validationErrors && validationErrors.length > 0"
            class="error-message"
          >
            <mat-card-content>
              <ul class="error-list-wrapper">
                <li *ngFor="let error of validationErrors">{{ error }}</li>
              </ul>
            </mat-card-content>
          </mat-card>

          <!-- Email Input Field -->
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Email Address</mat-label>
            <input
              matInput
              type="email"
              formControlName="email"
              placeholder="Insert your email"
            />
            <mat-error *ngIf="hasError('email', 'required')">
              Email is required.
            </mat-error>
            <mat-error *ngIf="hasError('email', 'pattern')">
              Please enter a valid email address.
            </mat-error>
          </mat-form-field>

          <!-- Submit Button -->
          <div class="form-group">
            <button
              mat-raised-button
              color="primary"
              type="submit"
              class="w-100 custom-button"
              [disabled]="isSubmitDisabled()"
            >
              {{ isSubmitting ? "Sending..." : "Send Reset Email" }}
            </button>
          </div>

          <!-- Back to Login Link -->
          <div class="return-login">
            <a routerLink="/login" class="text-decoration-none"
              >Back to Login</a
            >
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
