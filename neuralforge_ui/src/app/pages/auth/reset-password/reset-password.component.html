<div class="reset-container">
    <div class="d-flex align-items-center justify-content-center h-100">
        <div class="reset-card">
            <div class="w-100">

                <!-- Mensaje de éxito -->
                <div *ngIf="successMessage" class="alert alert-success text-center">
                    {{ successMessage }}
                </div>

                <!-- Lista de errores -->
                <div>
                    <ul *ngIf="validationErrors.length > 0" class="text-danger">
                        <li *ngFor="let error of validationErrors">{{ error }}</li>
                    </ul>
                </div>

                <!-- Formulario de restablecimiento de contraseña -->
                <form (ngSubmit)="submitForm()" autocomplete="off">
                    <div class="mb-3 text-center">
                        <h4>Reset Your Password</h4>
                        <small class="text-muted">
                            Enter a new password for your account.
                        </small>
                    </div>

                    <!-- Campo de nueva contraseña -->
                    <div class="form-group mb-4">
                        <label for="newPassword" class="form-label mb-2">New Password</label>
                        <input type="password" class="form-control" id="newPassword" name="newPassword"
                            [(ngModel)]="newPassword" required />
                    </div>

                    <!-- Campo de confirmación de contraseña -->
                    <div class="form-group mb-4">
                        <label for="confirmPassword" class="form-label mb-2">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                            [(ngModel)]="confirmPassword" required />
                    </div>

                    <!-- Botón de envío -->
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary btn-block w-100 custom-button">
                            Reset Password
                        </button>
                    </div>

                    <!-- Enlace de regreso al login -->
                    <div class="text-center mt-3">
                        <a routerLink="/login" class="text-decoration-none">Back to Login</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
