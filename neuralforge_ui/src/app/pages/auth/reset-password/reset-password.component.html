<div class="reset-container">
    <div class="reset-wrapper">
        <div class="reset-card">
            <div class="reset-content">
                <form (ngSubmit)="submitForm()" autocomplete="off">
                    <div class="form-header">
                        <h4>Reset Your Password</h4>
                        <small class="subtext">Enter a new password for your account.</small>
                    </div>

                    <!-- Success Message -->
                    <mat-card *ngIf="successMessage" class="alert-success">
                        <mat-card-content>
                            {{ successMessage }}
                        </mat-card-content>
                    </mat-card>

                    <!-- Error List -->
                    <mat-card *ngIf="validationErrors.length > 0" class="error-message">
                        <mat-card-content>
                            <ul class="error-list">
                                <li *ngFor="let error of validationErrors">{{ error }}</li>
                            </ul>
                        </mat-card-content>
                    </mat-card>

                    <!-- New Password Field -->
                    <mat-form-field appearance="outline" class="input-field">
                        <mat-label>New Password</mat-label>
                        <input
                                matInput
                                [type]="showNewPassword ? 'text' : 'password'"
                                name="newPassword"
                                [(ngModel)]="newPassword"
                                required>
                        <button
                                mat-icon-button
                                matSuffix
                                (click)="togglePasswordVisibility('new')"
                                type="button">
                            <mat-icon>{{ showNewPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
                        </button>
                    </mat-form-field>

                    <!-- Confirm Password Field -->
                    <mat-form-field appearance="outline" class="input-field">
                        <mat-label>Confirm Password</mat-label>
                        <input
                                matInput
                                [type]="showConfirmPassword ? 'text' : 'password'"
                                name="confirmPassword"
                                [(ngModel)]="confirmPassword"
                                required>
                        <button
                                mat-icon-button
                                matSuffix
                                (click)="togglePasswordVisibility('confirm')"
                                type="button">
                            <mat-icon>{{ showConfirmPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
                        </button>
                    </mat-form-field>

                    <!-- Submit Button -->
                    <div class="form-group">
                        <button mat-raised-button color="primary" type="submit" class="submit-button">
                            Reset Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
