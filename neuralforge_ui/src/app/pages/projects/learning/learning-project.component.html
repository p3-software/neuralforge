<ng-container *ngIf="!isLoading && !hasError">
  <app-project-details
    [project]="project"
    [isLoading]="isLoading"
    [hasError]="hasError"
    [errorMessage]="errorMessage"
    (editProject)="editProject()"
    (deleteProject)="onDeleteProject()"
  >
    <ng-template #overviewContent>
      <div class="project-info-card">
        <h2>Project Details</h2>
        <ng-container *ngIf="project">
          <p>
            <strong>Created:</strong>
            {{ project.createdAt | date : "longDate" }}
          </p>
          <p><strong>Project Type:</strong> Learning Project</p>
          <p><strong>Creator ID:</strong> {{ project.creatorUserId }}</p>
        </ng-container>
      </div>
    </ng-template>
  </app-project-details>
</ng-container>

<ng-container *ngIf="isLoading">
  <div class="loading-container">
    <mat-icon>hourglass_empty</mat-icon>
    <p>Loading project...</p>
  </div>
</ng-container>

<ng-container *ngIf="hasError && !isLoading">
  <div class="error-container">
    <mat-icon color="warn">error</mat-icon>
    <p>{{ errorMessage }}</p>
    <button mat-stroked-button color="primary" routerLink="/app/dashboard">
      Return to Dashboard
    </button>
  </div>
</ng-container>
