<div class="wrapper">
  <h2 mat-dialog-title>Create Learning Project</h2>
  <mat-dialog-content>
    <form [formGroup]="createProjectForm" class="form">
      <!-- Project Name -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" />
        <mat-error *ngIf="createProjectForm.get('name')?.hasError('required')">
          Name is required
        </mat-error>
      </mat-form-field>

      <!-- Description -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea
          matInput
          formControlName="description"
          class="description-field"
        ></textarea>
      </mat-form-field>
    </form>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button color="warn" (click)="onClose()">Close</button>
    <button
      mat-raised-button
      color="primary"
      [disabled]="createProjectForm.invalid"
      (click)="onSubmit()"
    >
      Create
    </button>
  </mat-dialog-actions>
</div>
