<div class="wrapper">
  <h2 mat-dialog-title>Create Dynamic Content</h2>
  <mat-dialog-content>
    <form (ngSubmit)="onSubmit()" #dynamicContentForm="ngForm">
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Title</mat-label>
        <input
          matInput
          type="text"
          name="title"
          [(ngModel)]="dynamicContent.title"
          required
        />
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Type</mat-label>
        <mat-select [(ngModel)]="dynamicContent.type" name="type" required>
          <mat-option [value]="null" disabled>Select a type</mat-option>
          <mat-option value="SUMMARY">Summary</mat-option>
        </mat-select>
      </mat-form-field>
      
      <div class="file-input">
        <label for="file" class="file-label">Upload PDF:</label>
        <input
          type="file"
          id="file"
          (change)="onFileSelected($event)"
          accept="application/pdf"
          class="file-input-field"
        />
        <span class="file-name" *ngIf="selectedFile">{{ selectedFile.name }}</span>
      </div>
      
      <div *ngIf="loading" class="loading-spinner">
        <mat-progress-spinner
          mode="indeterminate"
          color="primary"
          diameter="40"
        ></mat-progress-spinner>
      </div>

      <div class="form-actions">
        <button mat-button type="button" color="warn" (click)="onClose()">Cancel</button>
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="!dynamicContentForm.form.valid || !selectedFile || loading"
        >
          Create
        </button>
      </div>
      
    </form>
  </mat-dialog-content>
</div>
