<h2 class="dialog-title">Change Password</h2>

<form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
    <!-- Error Box -->
    <div *ngIf="errorMessages.length" class="error-list">
        <mat-icon class="error-icon">error</mat-icon>
        <ul>
            <li *ngFor="let message of errorMessages">{{ message }}</li>
        </ul>
    </div>

    <!-- Current Password -->
    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Current Password</mat-label>
        <input
                matInput
                [type]="showCurrentPassword ? 'text' : 'password'"
                formControlName="currentPassword"
                autocomplete="current-password"
        />
        <button
                mat-icon-button
                matSuffix
                type="button"
                (click)="toggleCurrentVisibility()"
        >
            <mat-icon>{{
                showCurrentPassword ? 'visibility_off' : 'visibility'
                }}</mat-icon>
        </button>
    </mat-form-field>

    <!-- New Password -->
    <mat-form-field appearance="outline" class="full-width">
        <mat-label>New Password</mat-label>
        <input
                matInput
                [type]="showNewPassword ? 'text' : 'password'"
                formControlName="newPassword"
                autocomplete="new-password"
        />
        <button
                mat-icon-button
                matSuffix
                type="button"
                (click)="toggleNewVisibility()"
        >
            <mat-icon>{{ showNewPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
    </mat-form-field>

    <!-- Actions -->
    <div class="actions">
        <button mat-button type="button" (click)="cancel()" [disabled]="isSubmitting">
            Cancel
        </button>
        <button
                mat-raised-button
                color="primary"
                type="submit"
                [disabled]="isSubmitting"
        >
            Save
        </button>
    </div>
</form>
