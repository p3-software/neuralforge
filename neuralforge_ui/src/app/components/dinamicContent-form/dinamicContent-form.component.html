<form #dynamicContentForm="ngForm" class="form">
  <!-- Title -->
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Title</mat-label>
    <input
      matInput
      name="title"
      #title="ngModel"
      [(ngModel)]="formData.title"
      required
    />
    <mat-error *ngIf="title.invalid && title.touched">
      Title is required
    </mat-error>
  </mat-form-field>

  <!-- Email -->
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Email</mat-label>
    <input
      matInput
      type="email"
      name="email"
      #email="ngModel"
      [(ngModel)]="formData.email"
      required
    />
    <mat-error *ngIf="email.invalid && email.touched">
      Valid email is required
    </mat-error>
  </mat-form-field>

  <!-- Type -->
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Type</mat-label>
    <input
      matInput
      name="type"
      #type="ngModel"
      [(ngModel)]="formData.type"
      required
    />
    <mat-error *ngIf="type.invalid && type.touched">
      Type is required
    </mat-error>
  </mat-form-field>

  <!-- Project ID -->
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Project ID</mat-label>
    <input
      matInput
      name="projectId"
      #projectId="ngModel"
      [(ngModel)]="formData.projectId"
      required
    />
    <mat-error *ngIf="projectId.invalid && projectId.touched">
      Project ID is required
    </mat-error>
  </mat-form-field>

  <!-- File Upload -->
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Upload File</mat-label>
    <input
      type="file"
      name="file"
      (change)="onFileChange($event)"
      required
    />
    <mat-error *ngIf="!formData.file">
      A file is required
    </mat-error>
  </mat-form-field>

  <!-- Slot for additional fields -->
  <ng-content></ng-content>

  <!-- Action buttons -->
  <div class="form-actions">
    <button mat-button color="warn" type="button" (click)="onCancel()">
      {{ cancelButtonText }}
    </button>
    <button
      mat-raised-button
      color="primary"
      type="button"
      [disabled]="dynamicContentForm.invalid || !formData.file"
      (click)="onSubmit(dynamicContentForm)"
    >
      {{ submitButtonText }}
    </button>
  </div>
</form>
