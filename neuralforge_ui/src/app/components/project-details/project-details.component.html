<ng-container *ngIf="!isLoading && project">
  <mat-card class="project-header">
    <div class="project-title">
      <h1>{{ project.name }}</h1>
      <mat-slide-toggle
        *ngIf="showNotificationsToggle"
        [checked]="notificationsEnabled"
        (change)="notificationsToggle.emit()"
      >
        Notifications
      </mat-slide-toggle>
    </div>
    <p class="project-description">
      {{ project.description || "No description available" }}
    </p>
  </mat-card>

  <mat-tab-group>
    <!-- Overview Tab -->
    <mat-tab label="Overview">
      <div class="overview-tab">
        <ng-container *ngIf="overviewContent">
          <ng-container *ngTemplateOutlet="overviewContent"></ng-container>
        </ng-container>
      </div>
    </mat-tab>

    <!-- Generated Content Tab -->
    <mat-tab label="Generated Contents">
      <div class="empty-state">
        <p>No contents generated yet.</p>
      </div>
    </mat-tab>

    <!-- Configuration Tab -->
    <mat-tab label="Configuration">
      <div class="config-actions">
        <button (click)="editProject.emit()" mat-stroked-button color="primary">
          Edit Project
        </button>
        <button (click)="deleteProject.emit()" mat-stroked-button color="warn">
          Delete Project
        </button>
      </div>
    </mat-tab>
  </mat-tab-group>
</ng-container>

<ng-container *ngIf="isLoading">
  <div class="loading-container">
    <mat-icon>hourglass_empty</mat-icon>
    <p>Loading project...</p>
  </div>
</ng-container>

<ng-container *ngIf="hasError">
  <div class="error-container">
    <mat-icon color="warn" class="error-icon">error_outline</mat-icon>
    <p class="error-message">{{ errorMessage }}</p>
  </div>
</ng-container>
