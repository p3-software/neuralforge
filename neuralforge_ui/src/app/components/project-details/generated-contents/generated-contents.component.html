<div class="generated-contents-container">
  <div class="header">
    <h2>Generated Contents</h2>
    <button mat-raised-button color="primary" (click)="openGenerateDialog()">
      <mat-icon>add</mat-icon>
      Generate New Content
    </button>
  </div>

  <div *ngIf="isLoading" class="loading-container">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Loading contents...</p>
  </div>

  <div *ngIf="!isLoading && contents.length === 0" class="empty-state">
    <mat-icon>folder_open</mat-icon>
    <p>No contents generated yet</p>
  </div>

  <div *ngIf="!isLoading && contents.length > 0" class="contents-table">
    <table mat-table [dataSource]="contents" class="mat-elevation-z8">
      <!-- Title Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let content">{{ content.title }}</td>
      </ng-container>

      <!-- Type Column -->
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let content">{{ content.type }}</td>
      </ng-container>

      <!-- Creation Date Column -->
      <ng-container matColumnDef="creationDate">
        <th mat-header-cell *matHeaderCellDef>Created</th>
        <td mat-cell *matCellDef="let content">
          {{ content.creationDate | date : "medium" }}
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let content">
          <button
            mat-icon-button
            color="primary"
            (click)="downloadContent(content)"
          >
            <mat-icon>download</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
