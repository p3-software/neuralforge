<mat-card class="dynamic-content-card">
  <mat-card-header>
    <mat-icon mat-card-avatar>description</mat-icon>
    <mat-card-title>{{ title }}</mat-card-title>
    <mat-card-subtitle>{{ creationDate | date: 'short' }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p><strong>Email:</strong> {{ email }}</p>
    <p><strong>Path:</strong> <a [href]="path" target="_blank">{{ path }}</a></p>
    <p><strong>Type:</strong> {{ type }}</p>
  </mat-card-content>
</mat-card>
