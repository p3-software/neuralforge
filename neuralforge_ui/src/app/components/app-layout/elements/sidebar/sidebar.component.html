<mat-sidenav-container class="sidebar-container">
  <mat-sidenav
          #sidenav
          [opened]="isSidebarOpen"
          mode="over"
          class="sidebar"
          [@slideInOut]="isSidebarOpen ? 'open' : 'closed'">

    <div class="sidebar-header">
      <a routerLink="/" class="logo-container" (click)="closeSidebar()">
        <div class="logo-wrapper">
          <img src="../../../../../assets/icons/logo@2x.png" width="80" alt="Logo" />
          <span class="logo-text">NeuralForge</span>
        </div>
      </a>
      <div class="sidebar-divider"></div> <!-- Stylish Divider -->
    </div>

    <mat-nav-list>
      <ng-container *ngFor="let route of permittedRoutes">
        <ng-container *ngIf="route.data?.showInSidebar">
          <a mat-list-item routerLink="{{ route.path }}" (click)="closeSidebar()" routerLinkActive="active">
            <span>{{ route.data?.name }}</span>
          </a>
        </ng-container>
      </ng-container>
    </mat-nav-list>

    <!-- 🔹 New Section for Profile and Logout -->
    <div class="sidebar-footer">
      <button mat-button routerLink="/app/profile" (click)="closeSidebar()" class="sidebar-button">
        <mat-icon>person</mat-icon>
        <span>{{this.userName}}</span>
      </button>
      <button mat-button (click)="logout()" class="sidebar-button">
        <mat-icon>exit_to_app</mat-icon>
        <span>Logout</span>
      </button>
    </div>

  </mat-sidenav>

  <!-- 🔹 Dark Overlay -->
  <div class="overlay" *ngIf="isSidebarOpen" (click)="toggleSidebar()"></div>

</mat-sidenav-container>

<!-- 🔹 Fixed button always visible -->
<button class="toggle-button" [ngClass]="{ 'open': isSidebarOpen, 'closed': !isSidebarOpen }" (click)="toggleSidebar()">
  <mat-icon>{{ isSidebarOpen ? 'chevron_left' : 'chevron_right' }}</mat-icon>
</button>
