name: Run Tests

on:
  pull_request:
    branches: [development, qa, production]

jobs:
  backend-tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and test with Maven
        working-directory: ./neuralforge_api
        run: mvn clean test

  frontend-tests:
    name: Run Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./neuralforge_ui/package-lock.json"

      - name: Install dependencies
        working-directory: ./neuralforge_ui
        run: npm ci

      - name: Run tests
        working-directory: ./neuralforge_ui
        run: npm test
